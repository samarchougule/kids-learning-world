<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Fruits Learning</title><style>:root{--accent:#f97316;--text:#172033;--soft:#ccfbf1}*{box-sizing:border-box}body{margin:0;font-family:"Comic Sans MS","Trebuchet MS",Arial,sans-serif;min-height:100vh;overflow:hidden;color:var(--text);background:linear-gradient(135deg,#fff7ad,#ffd6e8,#c7f9ff,#d9f99d);background-size:400% 400%;animation:bgMove 12s ease infinite}@keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}.app{width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;position:relative}.top-bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);width:min(1080px,calc(100% - 32px));display:flex;align-items:center;justify-content:space-between;gap:10px;z-index:10}.badge,.title-pill{background:rgba(255,255,255,.82);border:3px solid rgba(255,255,255,.96);border-radius:999px;padding:10px 18px;font-size:18px;font-weight:900;box-shadow:0 8px 20px rgba(0,0,0,.12);backdrop-filter:blur(10px)}.title-pill{max-width:42%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}button,.home-link{border:none;border-radius:999px;padding:11px 17px;font-size:15px;font-weight:900;color:white;cursor:pointer;text-decoration:none;box-shadow:0 8px 18px rgba(0,0,0,.18);transition:transform .2s ease,filter .2s ease}button:hover,.home-link:hover{transform:translateY(-2px) scale(1.03);filter:brightness(1.06)}.btn-purple{background:linear-gradient(135deg,#8b5cf6,#6366f1)}.btn-blue{background:linear-gradient(135deg,#06b6d4,#0ea5e9)}.btn-pink{background:linear-gradient(135deg,#f472b6,#ec4899)}.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}.btn-orange{background:linear-gradient(135deg,#fb923c,#f97316)}.slide{display:none;width:min(1080px,95vw);min-height:70vh;margin-top:42px;padding:26px;background:rgba(255,255,255,.74);border:5px solid rgba(255,255,255,.94);border-radius:36px;box-shadow:0 24px 60px rgba(0,0,0,.18);text-align:center;position:relative;overflow:hidden}.slide.active{display:grid;grid-template-columns:1fr 1.1fr;align-items:center;gap:26px;animation:popIn .55s ease}@keyframes popIn{0%{opacity:0;transform:scale(.92) translateY(30px)}100%{opacity:1;transform:scale(1) translateY(0)}}.letter-card{border-radius:32px;padding:22px;background:linear-gradient(160deg,#ffffff,#ffe4f4,#e0f2fe);box-shadow:inset 0 0 0 5px rgba(255,255,255,.75),0 12px 26px rgba(0,0,0,.12);min-height:440px;display:flex;flex-direction:column;align-items:center;justify-content:center}.letter{font-size:clamp(90px,16vw,210px);line-height:.9;font-weight:1000;color:var(--accent);text-shadow:6px 6px 0 #facc15,10px 10px 0 rgba(0,0,0,.08);animation:letterBounce 1.7s ease-in-out infinite}@keyframes letterBounce{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-12px) rotate(1deg)}}.phrase{margin-top:22px;font-size:clamp(28px,4vw,52px);font-weight:1000;color:#111827}.subtitle{margin-top:10px;font-size:clamp(16px,2vw,24px);font-weight:900;color:#0f766e;background:var(--soft);border-radius:999px;padding:8px 16px;display:inline-block}.image-card{border-radius:34px;overflow:hidden;background:linear-gradient(145deg,#fff1f2,#fefce8,#ecfeff);box-shadow:0 16px 34px rgba(0,0,0,.17);position:relative;min-height:440px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}.emoji-illustration{width:100%;min-height:320px;display:flex;align-items:center;justify-content:center;font-size:clamp(140px,18vw,275px);line-height:1;filter:drop-shadow(0 14px 18px rgba(0,0,0,.18));animation:emojiBounce 2s ease-in-out infinite;user-select:none}@keyframes emojiBounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-16px) scale(1.04)}}.image-label{position:absolute;left:18px;bottom:18px;right:18px;background:rgba(255,255,255,.88);backdrop-filter:blur(8px);border-radius:22px;padding:12px;font-size:30px;font-weight:1000;color:#111827;box-shadow:0 8px 18px rgba(0,0,0,.12)}.sparkle{position:absolute;width:18px;height:18px;border-radius:50%;background:#facc15;opacity:.75;animation:float 4s ease-in-out infinite}.sparkle:nth-child(1){top:9%;left:8%;background:#fb7185;animation-delay:.1s}.sparkle:nth-child(2){top:20%;right:9%;background:#38bdf8;animation-delay:.7s}.sparkle:nth-child(3){bottom:15%;left:13%;background:#4ade80;animation-delay:1.2s}.sparkle:nth-child(4){bottom:12%;right:11%;background:#facc15;animation-delay:1.7s}@keyframes float{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-18px) scale(1.25)}}.bottom-nav{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);width:min(1080px,calc(100% - 32px));display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:10}.progress-wrap{flex:1;height:18px;background:rgba(255,255,255,.75);border-radius:999px;overflow:hidden;border:3px solid white;box-shadow:0 6px 14px rgba(0,0,0,.12)}.progress{height:100%;width:0%;background:linear-gradient(90deg,#22c55e,#06b6d4,#8b5cf6,#f472b6);border-radius:999px;transition:width .35s ease}@media(max-width:760px){.top-bar,.bottom-nav{width:calc(100% - 20px)}.title-pill{display:none}.slide{padding:15px;margin-top:58px;min-height:73vh;border-radius:28px}.slide.active{grid-template-columns:1fr;gap:14px}.letter-card,.image-card{min-height:285px;border-radius:26px}.emoji-illustration{min-height:200px;font-size:150px}.circle-grid{min-height:200px;grid-template-columns:repeat(5,1fr);gap:10px;padding:12px}}</style></head><body><main class="app"><div class="top-bar"><div class="badge" id="counter">Slide 1 of 12</div><div class="title-pill">Fruits Learning</div><div class="buttons"><a class="home-link btn-purple" href="index.html">🏠 Home</a><button class="btn-pink" onclick="speakCurrent()">🔊 Speak</button><button class="btn-green" onclick="toggleAuto()" id="autoBtn">⏸ Pause</button><button class="btn-orange" onclick="toggleFullScreen()">⛶ Full Screen</button></div></div><section id="slides"></section><div class="bottom-nav"><button class="btn-purple" onclick="prevSlide()">⬅ Previous</button><div class="progress-wrap"><div class="progress" id="progress"></div></div><button class="btn-blue" onclick="nextSlide()">Next ➡</button></div></main><script>const speechLang="en-US";const items=[
      {
            "letter": "A",
            "title": "Apple",
            "emoji": "🍎",
            "sound": "Apple",
            "sub": "Apple",
            "label": "Apple"
      },
      {
            "letter": "M",
            "title": "Mango",
            "emoji": "🥭",
            "sound": "Mango",
            "sub": "Mango",
            "label": "Mango"
      },
      {
            "letter": "B",
            "title": "Banana",
            "emoji": "🍌",
            "sound": "Banana",
            "sub": "Banana",
            "label": "Banana"
      },
      {
            "letter": "G",
            "title": "Grapes",
            "emoji": "🍇",
            "sound": "Grapes",
            "sub": "Grapes",
            "label": "Grapes"
      },
      {
            "letter": "O",
            "title": "Orange",
            "emoji": "🍊",
            "sound": "Orange",
            "sub": "Orange",
            "label": "Orange"
      },
      {
            "letter": "S",
            "title": "Strawberry",
            "emoji": "🍓",
            "sound": "Strawberry",
            "sub": "Strawberry",
            "label": "Strawberry"
      },
      {
            "letter": "W",
            "title": "Watermelon",
            "emoji": "🍉",
            "sound": "Watermelon",
            "sub": "Watermelon",
            "label": "Watermelon"
      },
      {
            "letter": "P",
            "title": "Pineapple",
            "emoji": "🍍",
            "sound": "Pineapple",
            "sub": "Pineapple",
            "label": "Pineapple"
      },
      {
            "letter": "C",
            "title": "Cherry",
            "emoji": "🍒",
            "sound": "Cherry",
            "sub": "Cherry",
            "label": "Cherry"
      },
      {
            "letter": "K",
            "title": "Kiwi",
            "emoji": "🥝",
            "sound": "Kiwi",
            "sub": "Kiwi",
            "label": "Kiwi"
      },
      {
            "letter": "C",
            "title": "Coconut",
            "emoji": "🥥",
            "sound": "Coconut",
            "sub": "Coconut",
            "label": "Coconut"
      },
      {
            "letter": "L",
            "title": "Lemon",
            "emoji": "🍋",
            "sound": "Lemon",
            "sub": "Lemon",
            "label": "Lemon"
      }
];const slidesContainer=document.getElementById('slides');const counter=document.getElementById('counter');const progress=document.getElementById('progress');const autoBtn=document.getElementById('autoBtn');let current=0;let autoPlay=true;let timer;items.forEach((item,index)=>{const slide=document.createElement('article');slide.className='slide'+(index===0?' active':'');slide.innerHTML=`<span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><div class="letter-card"><div class="letter">${item.letter}</div><div class="phrase">${item.title}</div><div class="subtitle">${item.sub||item.sound}</div></div><div class="image-card"><div class="emoji-illustration" aria-label="${item.title} illustration" title="${item.title}">${item.emoji}</div><div class="image-label">${item.label||item.title}</div></div>`;slidesContainer.appendChild(slide);});const slides=document.querySelectorAll('.slide');function updateUI(){counter.textContent=`Slide ${current+1} of ${items.length}`;progress.style.width=`${((current+1)/items.length)*100}%`;}function speak(text){if(!('speechSynthesis' in window)){alert('Voice pronunciation is not supported in this browser.');return;}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang=speechLang;u.rate=.78;u.pitch=1.15;u.volume=1;window.speechSynthesis.speak(u);}function speakCurrent(){speak(items[current].sound);}function showSlide(nextIndex,shouldSpeak=true){slides[current].classList.remove('active');current=(nextIndex+slides.length)%slides.length;slides[current].classList.add('active');updateUI();if(shouldSpeak)speakCurrent();}function nextSlide(){showSlide(current+1)}function prevSlide(){showSlide(current-1)}function startTimer(){clearInterval(timer);timer=setInterval(()=>{if(autoPlay)nextSlide();},4200);}function toggleAuto(){autoPlay=!autoPlay;autoBtn.textContent=autoPlay?'⏸ Pause':'▶ Play';if(autoPlay)speakCurrent();}function toggleFullScreen(){const el=document.documentElement;if(!document.fullscreenElement){if(el.requestFullscreen)el.requestFullscreen();}else{if(document.exitFullscreen)document.exitFullscreen();}}document.addEventListener('keydown',e=>{if(e.key==='ArrowRight')nextSlide();if(e.key==='ArrowLeft')prevSlide();if(e.key.toLowerCase()==='f')toggleFullScreen();if(e.key===' '){e.preventDefault();toggleAuto();}});updateUI();startTimer();setTimeout(()=>speakCurrent(),700);</script></body></html>
