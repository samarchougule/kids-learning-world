<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A-Z Alphabet Slideshow for Kids</title>
  <style>
    :root{
      --primary:#7c3aed;
      --secondary:#06b6d4;
      --yellow:#facc15;
      --pink:#f472b6;
      --green:#22c55e;
      --text:#1f2937;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Comic Sans MS, Trebuchet MS, Arial, sans-serif;
      min-height:100vh;
      overflow:hidden;
      color:var(--text);
      background:linear-gradient(135deg,#fff7ad,#ffd6e8,#c7f9ff,#d9f99d);
      background-size:400% 400%;
      animation:bgMove 12s ease infinite;
    }

    @keyframes bgMove{
      0%{background-position:0% 50%}
      50%{background-position:100% 50%}
      100%{background-position:0% 50%}
    }

    .app{
      width:100vw;
      height:100vh;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:20px;
      position:relative;
    }

    .top-bar{
      position:fixed;
      top:16px;
      left:50%;
      transform:translateX(-50%);
      width:min(980px,calc(100% - 32px));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      z-index:10;
    }

    .badge{
      background:rgba(255,255,255,.78);
      backdrop-filter:blur(10px);
      border:3px solid rgba(255,255,255,.9);
      border-radius:999px;
      padding:10px 18px;
      font-size:18px;
      font-weight:800;
      box-shadow:0 8px 20px rgba(0,0,0,.12);
    }

    .buttons{display:flex;flex-wrap:wrap;gap:8px;justify-content:flex-end}

    button{
      border:none;
      border-radius:999px;
      padding:11px 17px;
      font-size:15px;
      font-weight:800;
      color:white;
      cursor:pointer;
      box-shadow:0 8px 18px rgba(0,0,0,.18);
      transition:transform .2s ease,filter .2s ease;
    }

    button:hover{transform:translateY(-2px) scale(1.03);filter:brightness(1.06)}
    button:active{transform:scale(.97)}

    .btn-purple{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
    .btn-blue{background:linear-gradient(135deg,#06b6d4,#0ea5e9)}
    .btn-pink{background:linear-gradient(135deg,#f472b6,#ec4899)}
    .btn-green{background:linear-gradient(135deg,#22c55e,#16a34a)}
    .btn-orange{background:linear-gradient(135deg,#fb923c,#f97316)}

    .slide{
      display:none;
      width:min(980px,95vw);
      min-height:70vh;
      padding:26px;
      margin-top:42px;
      background:rgba(255,255,255,.74);
      border:5px solid rgba(255,255,255,.94);
      border-radius:36px;
      box-shadow:0 24px 60px rgba(0,0,0,.18);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .slide.active{
      display:grid;
      grid-template-columns:1fr 1.1fr;
      align-items:center;
      gap:26px;
      animation:popIn .55s ease;
    }

    @keyframes popIn{
      0%{opacity:0;transform:scale(.92) translateY(30px)}
      100%{opacity:1;transform:scale(1) translateY(0)}
    }

    .letter-card{
      border-radius:32px;
      padding:22px;
      background:linear-gradient(160deg,#ffffff,#ffe4f4,#e0f2fe);
      box-shadow:inset 0 0 0 5px rgba(255,255,255,.75),0 12px 26px rgba(0,0,0,.12);
      position:relative;
      min-height:440px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
    }

    .letter{
      font-size:clamp(130px,19vw,230px);
      line-height:.85;
      font-weight:1000;
      color:#7c3aed;
      text-shadow:6px 6px 0 #facc15,10px 10px 0 rgba(0,0,0,.08);
      animation:letterBounce 1.7s ease-in-out infinite;
    }

    @keyframes letterBounce{
      0%,100%{transform:translateY(0) rotate(-1deg)}
      50%{transform:translateY(-12px) rotate(1deg)}
    }

    .phrase{
      margin-top:22px;
      font-size:clamp(28px,4vw,52px);
      font-weight:1000;
      color:#111827;
    }

    .phonics{
      margin-top:10px;
      font-size:22px;
      font-weight:800;
      color:#0f766e;
      background:#ccfbf1;
      border-radius:999px;
      padding:8px 16px;
      display:inline-block;
    }

    .image-card{
      border-radius:34px;
      overflow:hidden;
      background:linear-gradient(145deg,#fff1f2,#fefce8,#ecfeff);
      box-shadow:0 16px 34px rgba(0,0,0,.17);
      position:relative;
      min-height:440px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .emoji-illustration{
      width:100%;
      min-height:320px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:clamp(150px,18vw,280px);
      line-height:1;
      filter:drop-shadow(0 14px 18px rgba(0,0,0,.18));
      animation:emojiBounce 2s ease-in-out infinite;
      user-select:none;
    }

    @keyframes emojiBounce{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-16px) scale(1.04)}
    }

    .image-label{
      position:absolute;
      left:18px;
      bottom:18px;
      right:18px;
      background:rgba(255,255,255,.88);
      backdrop-filter:blur(8px);
      border-radius:22px;
      padding:12px;
      font-size:30px;
      font-weight:1000;
      color:#111827;
      box-shadow:0 8px 18px rgba(0,0,0,.12);
    }

    .sparkle{
      position:absolute;
      width:18px;
      height:18px;
      border-radius:50%;
      background:#facc15;
      opacity:.75;
      animation:float 4s ease-in-out infinite;
    }

    .sparkle:nth-child(1){top:9%;left:8%;background:#fb7185;animation-delay:.1s}
    .sparkle:nth-child(2){top:20%;right:9%;background:#38bdf8;animation-delay:.7s}
    .sparkle:nth-child(3){bottom:15%;left:13%;background:#4ade80;animation-delay:1.2s}
    .sparkle:nth-child(4){bottom:12%;right:11%;background:#facc15;animation-delay:1.7s}

    @keyframes float{
      0%,100%{transform:translateY(0) scale(1)}
      50%{transform:translateY(-18px) scale(1.25)}
    }

    .bottom-nav{
      position:fixed;
      bottom:16px;
      left:50%;
      transform:translateX(-50%);
      width:min(980px,calc(100% - 32px));
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      z-index:10;
    }

    .progress-wrap{
      flex:1;
      height:18px;
      background:rgba(255,255,255,.75);
      border-radius:999px;
      overflow:hidden;
      border:3px solid white;
      box-shadow:0 6px 14px rgba(0,0,0,.12);
    }

    .progress{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#22c55e,#06b6d4,#8b5cf6,#f472b6);
      border-radius:999px;
      transition:width .35s ease;
    }

    .cloud{
      position:absolute;
      background:white;
      width:120px;
      height:44px;
      border-radius:999px;
      opacity:.52;
      filter:blur(.2px);
      animation:cloudMove 18s linear infinite;
    }
    .cloud:before,.cloud:after{content:"";position:absolute;background:white;border-radius:50%}
    .cloud:before{width:58px;height:58px;left:18px;top:-26px}
    .cloud:after{width:68px;height:68px;right:18px;top:-34px}
    .cloud.one{top:12%;left:-130px;animation-delay:0s}
    .cloud.two{top:68%;left:-160px;animation-delay:7s;transform:scale(1.2)}

    @keyframes cloudMove{to{left:110vw}}

    .hint{
      position:fixed;
      right:18px;
      top:84px;
      background:rgba(255,255,255,.75);
      border-radius:18px;
      padding:10px 14px;
      font-size:14px;
      font-weight:800;
      box-shadow:0 8px 18px rgba(0,0,0,.11);
      z-index:9;
    }

    @media(max-width:760px){
      .top-bar,.bottom-nav{width:calc(100% - 20px)}
      .top-bar{top:8px;align-items:flex-start}
      .badge{font-size:14px;padding:8px 12px}
      button{font-size:13px;padding:9px 12px}
      .slide{padding:15px;margin-top:58px;min-height:73vh;border-radius:28px}
      .slide.active{grid-template-columns:1fr;gap:14px}
      .letter-card,.image-card{min-height:285px;border-radius:26px}
      .emoji-illustration{min-height:200px;font-size:150px}
      .phrase{font-size:32px}
      .phonics{font-size:18px}
      .image-label{font-size:24px;padding:9px}
      .hint{display:none}
    }
  </style>
</head>
<body>
  <div class="cloud one"></div>
  <div class="cloud two"></div>

  <main class="app" id="app">
    <div class="top-bar">
      <div class="badge" id="counter">Slide 1 of 26</div>
      <div class="buttons">
        <button class="btn-pink" onclick="speakCurrent()">🔊 Speak</button>
        <button class="btn-green" onclick="toggleAuto()" id="autoBtn">⏸ Pause</button>
        <button class="btn-orange" onclick="toggleFullScreen()">⛶ Full Screen</button>
      </div>
    </div>

    <div class="hint">Tip: Use ← → keys</div>
    <section id="slides"></section>

    <div class="bottom-nav">
      <button class="btn-purple" onclick="prevSlide()">⬅ Previous</button>
      <div class="progress-wrap"><div class="progress" id="progress"></div></div>
      <button class="btn-blue" onclick="nextSlide()">Next ➡</button>
    </div>
  </main>

  <script>
    const items = [
      {letter:'A', word:'Apple', emoji:'🍎', sound:'A for Apple'},
      {letter:'B', word:'Ball', emoji:'⚽', sound:'B for Ball'},
      {letter:'C', word:'Cat', emoji:'🐱', sound:'C for Cat'},
      {letter:'D', word:'Dog', emoji:'🐶', sound:'D for Dog'},
      {letter:'E', word:'Elephant', emoji:'🐘', sound:'E for Elephant'},
      {letter:'F', word:'Fish', emoji:'🐟', sound:'F for Fish'},
      {letter:'G', word:'Grapes', emoji:'🍇', sound:'G for Grapes'},
      {letter:'H', word:'House', emoji:'🏠', sound:'H for House'},
      {letter:'I', word:'Ice Cream', emoji:'🍦', sound:'I for Ice Cream'},
      {letter:'J', word:'Juice', emoji:'🧃', sound:'J for Juice'},
      {letter:'K', word:'Kite', emoji:'🪁', sound:'K for Kite'},
      {letter:'L', word:'Lion', emoji:'🦁', sound:'L for Lion'},
      {letter:'M', word:'Monkey', emoji:'🐵', sound:'M for Monkey'},
      {letter:'N', word:'Nest', emoji:'🪺', sound:'N for Nest'},
      {letter:'O', word:'Orange', emoji:'🍊', sound:'O for Orange'},
      {letter:'P', word:'Parrot', emoji:'🦜', sound:'P for Parrot'},
      {letter:'Q', word:'Queen', emoji:'👑', sound:'Q for Queen'},
      {letter:'R', word:'Rabbit', emoji:'🐰', sound:'R for Rabbit'},
      {letter:'S', word:'Sun', emoji:'☀️', sound:'S for Sun'},
      {letter:'T', word:'Tiger', emoji:'🐯', sound:'T for Tiger'},
      {letter:'U', word:'Umbrella', emoji:'☂️', sound:'U for Umbrella'},
      {letter:'V', word:'Van', emoji:'🚐', sound:'V for Van'},
      {letter:'W', word:'Watch', emoji:'⌚', sound:'W for Watch'},
      {letter:'X', word:'Xylophone', emoji:'🎼', sound:'X for Xylophone'},
      {letter:'Y', word:'Yak', emoji:'🐂', sound:'Y for Yak'},
      {letter:'Z', word:'Zebra', emoji:'🦓', sound:'Z for Zebra'}
    ];

    const slidesContainer = document.getElementById('slides');
    const counter = document.getElementById('counter');
    const progress = document.getElementById('progress');
    const autoBtn = document.getElementById('autoBtn');
    let current = 0;
    let autoPlay = true;
    let timer;

    items.forEach((item, index) => {
      const slide = document.createElement('article');
      slide.className = 'slide' + (index === 0 ? ' active' : '');
      slide.innerHTML = `
        <span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span><span class="sparkle"></span>
        <div class="letter-card">
          <div class="letter">${item.letter}</div>
          <div class="phrase">${item.letter} for ${item.word}</div>
          <div class="phonics">Say: ${item.sound}</div>
        </div>
        <div class="image-card">
          <div class="emoji-illustration" aria-label="${item.word} illustration" title="${item.word}">${item.emoji}</div>
          <div class="image-label">${item.word}</div>
        </div>
      `;
      slidesContainer.appendChild(slide);
    });

    const slides = document.querySelectorAll('.slide');

    function updateUI(){
      counter.textContent = `Slide ${current + 1} of ${items.length}`;
      progress.style.width = `${((current + 1) / items.length) * 100}%`;
    }

    function speak(text){
      if(!('speechSynthesis' in window)){
        alert('Voice pronunciation is not supported in this browser.');
        return;
      }
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.rate = 0.78;
      utterance.pitch = 1.15;
      utterance.volume = 1;
      window.speechSynthesis.speak(utterance);
    }

    function speakCurrent(){
      speak(items[current].sound);
    }

    function showSlide(nextIndex, shouldSpeak = true){
      slides[current].classList.remove('active');
      current = (nextIndex + slides.length) % slides.length;
      slides[current].classList.add('active');
      updateUI();
      if(shouldSpeak) speakCurrent();
    }

    function nextSlide(){showSlide(current + 1)}
    function prevSlide(){showSlide(current - 1)}

    function startTimer(){
      clearInterval(timer);
      timer = setInterval(() => {
        if(autoPlay) nextSlide();
      }, 4200);
    }

    function toggleAuto(){
      autoPlay = !autoPlay;
      autoBtn.textContent = autoPlay ? '⏸ Pause' : '▶ Play';
      if(autoPlay) speakCurrent();
    }

    function toggleFullScreen(){
      const el = document.documentElement;
      if(!document.fullscreenElement){
        if(el.requestFullscreen) el.requestFullscreen();
      } else {
        if(document.exitFullscreen) document.exitFullscreen();
      }
    }

    document.addEventListener('keydown', (e) => {
      if(e.key === 'ArrowRight') nextSlide();
      if(e.key === 'ArrowLeft') prevSlide();
      if(e.key.toLowerCase() === 'f') toggleFullScreen();
      if(e.key === ' ') { e.preventDefault(); toggleAuto(); }
    });

    document.addEventListener('click', (e) => {
      if(e.target.tagName !== 'BUTTON') speakCurrent();
    });

    updateUI();
    startTimer();
    setTimeout(() => speakCurrent(), 700);
  </script>
</body>
</html>
